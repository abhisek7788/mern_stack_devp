<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation transform</title>
    <style>
        div{
            
            height: 300px;
            width: 300px;
            background-color: blueviolet;
            border: 2px solid black;
            margin: 200px;
            border-radius: 50%;
            padding: 10px;
            transition: all 7s ease-in;
            text-align: center;
        }
        div:hover{
            background-color: red;
            color: black;
            font-size: 40px;
            transform: rotate(360deg);
            transform: scale(2);
            transform: skew(360deg);
        }
    </style>
</head>
<body>
    <div>animation transformation</div>
</body>
</html>
