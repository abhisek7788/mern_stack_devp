<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        .container{
            height: 300px;
            width: 300px;
            background-color: aqua;
        }
        .box{
            height: 100px;
            width: 100px;
        }
        .red{
            background-color: red;
            position: relative;
            left: 90px;
            top: 130px;
        }
        .green{
            background-color: green;
            position: absolute;
            left: 60px;
            top: 70px;
            bottom: 0px;
        }
        .blue{
            background-color: blue;
            position: fixed;
            right: 50px;
            bottom: 50px;
        }
        .purple{
            background-color: purple;
            position: sticky;
            top: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box red"></div>
        <div class="box green"></div>
        <div class="box blue"></div>
        <div class="box purple"></div>
    </div>
    <div></div>
</body>
</html>
